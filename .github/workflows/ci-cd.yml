name: CI/CD Pipeline DevOps Evaluation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -----------------------------------------------------------------
  # JOB 1: Compilación y Pruebas Unitarias (IE2)
  # -----------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar el código fuente
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Automatización del permiso de ejecución para evitar el error de Linux (Permission Denied)
    - name: Dar permisos de ejecucion al Maven Wrapper en Linux
      run: chmod +x ./mvnw

    - name: Ejecutar Pruebas Unitarias (JUnit)
      run: ./mvnw test

  # -----------------------------------------------------------------
  # JOB 2: Análisis de Seguridad y Calidad (IE3)
  # -----------------------------------------------------------------
  security-analysis:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Configurar el código fuente
      uses: actions/checkout@v4

    - name: Instalar Snyk CLI
      uses: snyk/actions/setup@master

    - name: Ejecutar Snyk para buscar vulnerabilidades
      run: snyk test --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # -----------------------------------------------------------------
  # JOB 3: Construcción de Imagen y Despliegue Simulado (IE1, IE4, IE5)
  # -----------------------------------------------------------------
  deploy-simulated:
    needs: security-analysis
    runs-on: ubuntu-latest

    steps:
    - name: Configurar el código fuente
      uses: actions/checkout@v4

    - name: Construir Imagen Docker de la App
      run: docker build -t mi-microservicio:latest .

    - name: Simular Despliegue con Docker Compose
      run: |
        # Levantar los contenedores en segundo plano
        docker compose up -d
        
        # Esperar un tiempo prudente (15 segundos) para que MySQL y Spring Boot inicien
        sleep 15
        
        # Mostrar en los logs el estado actual de los contenedores
        docker ps
        
        # Verificar mediante la API de Docker si el contenedor de Spring Boot está activo
        if [ $(docker inspect -f '{{.State.Running}}' springboot-app) = "true" ]; then
          echo "========================================================"
          echo "¡Despliegue simulado exitoso! El contenedor está corriendo."
          echo "========================================================"
        else
          echo "========================================================"
          echo "ERROR: El contenedor de la aplicación falló al iniciar."
          echo "========================================================"
          exit 1
        fi